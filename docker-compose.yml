services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: moodbrief_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d moodbrief_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@db:5432/moodbrief_db
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      OPENROUTER_TEXT_MODEL: ${OPENROUTER_TEXT_MODEL:-}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-}
      ALLOW_DEVTUNNELS: ${ALLOW_DEVTUNNELS:-False}
      SECRET_KEY: ${SECRET_KEY:-}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      COOKIE_SECURE: ${COOKIE_SECURE:-False}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty value = same-origin: the browser bundle uses relative URLs,
        # nginx routes them. Override only if you skip nginx and need an
        # absolute URL (e.g. for direct devtunnel access).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL-}
    restart: always
    expose:
      - "3000"
    environment:
      # Used by Next.js Server Actions / route handlers running inside this
      # container — they bypass nginx and hit the backend over the docker
      # network directly.
      API_URL: ${API_URL:-http://backend:8000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL-}
      # Next 16 standalone biнds to $HOSTNAME, which Docker auto-sets to the
      # container ID — that interface isn't reachable from other containers.
      # Force binding to all interfaces so nginx can proxy in.
      HOSTNAME: 0.0.0.0
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
