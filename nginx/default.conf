# Single-origin reverse proxy in front of frontend + backend.
#
# Browser sees one host (http://localhost or whatever public URL fronts
# this), so:
#   * No CORS — every fetch is same-origin
#   * No mixed-content issues over HTTPS tunnels
#   * Cookies set by login Server Actions are sent to backend automatically
#   * Long-running endpoints aren't capped by devtunnels' 100s timeout

upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_upstream {
    server backend:8000;
}

# Rate limit zone — keyed by client IP. 10 req/s with a small burst is plenty
# for normal use and stops trivial brute force / scrape loops.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# Tighter zone for the auth surface — login / register / refresh.
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/s;

server {
    listen 80;
    server_name _;

    # Drop common probe paths early.
    location ~* \.(php|asp|aspx|env|git)$ { return 404; }

    # Basic hardening headers (HTTP-only deployment; HSTS deliberately off).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Generous timeouts for AI generation (default nginx is 60s).
    proxy_connect_timeout 30s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;
    send_timeout          600s;

    # No request-body size limit (image uploads can be large).
    client_max_body_size 50m;

    # Common proxy headers — applied to both location blocks below.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Backend: FastAPI under /api and /health.
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://backend_upstream;
    }
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend_upstream;
    }
    location = /health {
        proxy_pass http://backend_upstream;
    }

    # Everything else: Next.js (HTML, _next/* assets, Server Actions, etc.).
    # WebSocket upgrade headers are required for Next dev HMR — harmless in prod.
    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
